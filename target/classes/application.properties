# =============================================================================
# MEDICLINIC — application.properties
# Local: src/main/resources/application.properties
# =============================================================================


# =============================================================================
# SERVIDOR
# =============================================================================
server.port=8080
spring.application.name=gestao-medica


# =============================================================================
# BANCO DE DADOS — H2 IN-MEMORY
# =============================================================================
spring.datasource.url=jdbc:h2:mem:mediclinicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# =============================================================================
# JPA / HIBERNATE
# =============================================================================

# create-drop: cria as tabelas ao subir e apaga ao encerrar (ideal para dev)
spring.jpa.hibernate.ddl-auto=create-drop

# Dialeto do H2 para o Hibernate gerar SQL compatível
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Exibe o SQL gerado no terminal — útil para depuração
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =============================================================================
# H2 CONSOLE — acessível em http://localhost:8080/h2-console
# JDBC URL para conectar no console: jdbc:h2:mem:mediclinicdb
# Usuário: sa | Senha: (deixar em branco)
# =============================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false


# =============================================================================
# LOGS — reduzir verbosidade do Spring Security em desenvolvimento
# =============================================================================
logging.level.org.springframework.security=DEBUG
logging.level.gestao=DEBUG
